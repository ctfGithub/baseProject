
logging:
  level:
    root: info
    com.springbootbasepackage.controller: debug


server:
  port: 8099
  compression:
    enabled: true
    mime-types:
      - application-json
      - application/xml
      - application/javascript
      - text/html
      - text/xml
      - text/plain
      - text/css
    min-response-size: 2048

xxl:
  job:
    admin:
      # XXL-Job 后台地址（你自己的）
      addresses: http://127.0.0.1:8080/xxl-job-admin
    executor:
      # 随便起，唯一就行
      appname: ${spring.application.name}
      # 本地日志路径
      logpath: ./logs/xxl-job
    # 执行器通讯令牌（默认就是这个，不用改）
    accessToken: default_token




spring:
  datasource:
    ufc:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/dj_second_phase?serverTimezone=UTC&characterEncoding=utf-8
      username: root
      password: 123456
    filters:
      stat,wall
  redis:
    database: 1
    host: localhost
    port: 6379
    password:
    lettuce:
      pool:
        max-active: 200
        max-wait: 10
        min-idle: 0
    timeout: 1000






